    @cost(weight: "10")
  createOnboardingTask(request: CreateOnboardingTaskRequestInput!): OnboardingTaskDto!
    @cost(weight: "10")
  createTodo(request: CreateTodoRequestInput!): BaseResponseOfCreateTodoResponse!
    @cost(weight: "10")
  updateTodo(request: UpdateTodoRequestInput!): BaseResponseOfUpdateTodoResponse!
    @cost(weight: "10")
  deleteTodo(request: DeleteTodoRequestInput!): BaseResponseOfDeleteTodoResponse!
