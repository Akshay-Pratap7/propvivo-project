    @cost(weight: "10")
  announcements(request: GetAllAnnouncementsRequestInput!): PagedResponseOfAnnouncementDto!
    @cost(weight: "10")
  goals(request: GetAllGoalsRequestInput!): PagedResponseOfGoalDto!
    @cost(weight: "10")
  trainingModules(request: GetAllTrainingModulesRequestInput!): PagedResponseOfTrainingModuleDto!
    @cost(weight: "10")
  recognitions(request: GetAllRecognitionsRequestInput!): PagedResponseOfRecognitionDto!
    @cost(weight: "10")
  contributions(request: GetAllContributionsRequestInput!): PagedResponseOfValueContributionDto!
    @cost(weight: "10")
  jobPostings(request: GetAllJobPostingsRequestInput!): PagedResponseOfJobPostingDto!
    @cost(weight: "10")
  analyticsReports(request: GetAllReportsRequestInput!): PagedResponseOfAnalyticsReportDto!
    @cost(weight: "10")
  onboardingTasks(request: GetAllOnboardingTasksRequestInput!): PagedResponseOfOnboardingTaskDto!
    @cost(weight: "10")
  getAllTodos(request: GetAllTodosRequestInput!): BaseResponsePaginationOfGetAllTodosResponse!
    @cost(weight: "10")
  getAllEmployees(request: GetAllEmployeesRequestInput!): BaseResponsePaginationOfGetAllEmployeesResponse!
    @cost(weight: "10")
  getAllAttendance(request: GetAllAttendanceRequestInput!): BaseResponsePaginationOfGetAllAttendanceResponse!
    @cost(weight: "10")
  getAllLeaves(request: GetAllLeavesRequestInput!): BaseResponsePaginationOfGetAllLeavesResponse!
    @cost(weight: "10")
}

type Mutation {
  ping: String!
  createDocument(request: CreateDocumentRequestInput!): BaseResponseOfCreateDocumentResponse!
    @cost(weight: "10")
  updateDocument(request: UpdateDocumentRequestInput!): BaseResponseOfUpdateDocumentResponse!
    @cost(weight: "10")
  deleteDocument(request: DeleteDocumentRequestInput!): BaseResponseOfDeleteDocumentResponse!
    @cost(weight: "10")
  createPayroll(request: CreatePayrollRequestInput!): BaseResponseOfCreatePayrollResponse!
    @cost(weight: "10")
  updatePayroll(request: UpdatePayrollRequestInput!): BaseResponseOfUpdatePayrollResponse!
    @cost(weight: "10")
  deletePayroll(request: DeletePayrollRequestInput!): BaseResponseOfDeletePayrollResponse!
    @cost(weight: "10")
  createExpense(request: CreateExpenseRequestInput!): BaseResponseOfCreateExpenseResponse!
    @cost(weight: "10")
  updateExpense(request: UpdateExpenseRequestInput!): BaseResponseOfUpdateExpenseResponse!
    @cost(weight: "10")
  deleteExpense(request: DeleteExpenseRequestInput!): BaseResponseOfDeleteExpenseResponse!
    @cost(weight: "10")
  chat(request: ChatRequestInput!): CopilotMessageDto! @cost(weight: "10")
  createTeamMember(request: CreateTeamMemberRequestInput!): BaseResponseOfCreateTeamMemberResponse!
    @cost(weight: "10")
  updateTeamMember(request: UpdateTeamMemberRequestInput!): BaseResponseOfUpdateTeamMemberResponse!
    @cost(weight: "10")
  deleteTeamMember(request: DeleteTeamMemberRequestInput!): BaseResponseOfDeleteTeamMemberResponse!
    @cost(weight: "10")
  createAnnouncement(request: CreateAnnouncementRequestInput!): AnnouncementDto!
    @cost(weight: "10")
  createGoal(request: CreateGoalRequestInput!): GoalDto! @cost(weight: "10")
  createTrainingModule(request: CreateTrainingModuleRequestInput!): TrainingModuleDto!
